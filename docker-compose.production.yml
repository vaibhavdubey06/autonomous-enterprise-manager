x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

x-common-env: &common-env
  APP_ENV: production
  POSTGRES_USER: ${POSTGRES_USER:-aem}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-prod}
  POSTGRES_DB: ${POSTGRES_DB:-enterprise_manager}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  QDRANT_URL: http://qdrant:6333
  REDIS_URL: redis://redis:6379/0
  BACKEND_URL: http://backend:8000
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}

services:
  postgres:
    image: postgres:16-alpine
    container_name: aem-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-prod}
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aem} -d ${POSTGRES_DB:-enterprise_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - aem_network

  redis:
    image: redis:7-alpine
    container_name: aem-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - aem_network

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: aem-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /readyz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep -q \"200 OK\"'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - aem_network

  migrate:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: aem-migrate
    command: ["alembic", "upgrade", "head"]
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    logging: *default-logging
    networks:
      - aem_network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: aem-backend
    environment: *common-env
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - aem_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: aem-frontend
    environment:
      <<: *common-env
      BACKEND_URL: http://backend:8000
      STREAMLIT_SERVER_HEADLESS: "true"
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8501/_stcore/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - aem_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  nginx:
    image: nginx:1.27-alpine
    container_name: aem-nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - aem_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  nginx_cache:

networks:
  aem_network:
    driver: bridge
