name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-gate:
    name: Engineering Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          cd apps/backend
          uv sync
          
      - name: Run Ruff Linter
        run: uvx ruff check apps/backend/ --ignore E402,E701,E702,F401,F821,F841
        
      - name: Run Black Formatter
        run: uvx black --check apps/backend/
        
      - name: Run MyPy Type Checker
        working-directory: apps/backend
        run: uv run mypy app || true
        
  test:
    name: Test Suite
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          cd apps/backend
          uv sync
          
      - name: Run PyTest
        env:
          TESTING: "true"
          GITHUB_TOKEN: "mock_github_token"
          GEMINI_API_KEY: "mock_gemini_key"
          OPENAI_API_KEY: "mock_openai_key"
        run: |
          cd apps/backend
          uv run pytest tests/ -v || true
